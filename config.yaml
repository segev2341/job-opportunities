# ============================================================
# Job Opportunities Scraper - Configuration
# ============================================================

search:
  # Job role keywords to search for
  keywords:
    - "sales enablement"
    - "pre-sales"
    - "presales"
    - "business development"
    - "BD manager"
    - "sales engineer"
    - "solutions consultant"
    - "account executive"

  # Location filter
  location: "Israel"
  geo_id: "101620260"  # LinkedIn geographic ID for Israel

  # How many job results to fetch per keyword (max 1000)
  max_results_per_keyword: 100

